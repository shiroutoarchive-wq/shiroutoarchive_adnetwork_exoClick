  .search-input:focus { border-color: #e8003d; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #555; cursor: pointer; font-size: 1.1rem; display: none; }
  .search-count { font-size: 0.75rem; color: #555; margin-top: 7px; }
  .container { max-width: 760px; margin: 0 auto; padding: 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #1a1a1a; border: 1px solid #252525; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; display: flex; flex-direction: column; }
  .card:hover { border-color: #e8003d; }
  .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: #222; display: block; }
  .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; }
  .card-num { font-size: 0.65rem; font-weight: bold; color: #e8003d; letter-spacing: 0.05em; margin-bottom: 6px; }
  .card-title { font-size: 0.82rem; color: #ddd; line-height: 1.5; margin-bottom: 8px; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .tags { margin-bottom: 10px; }
  .tag { display: inline-block; background: #252525; color: #888; font-size: 0.62rem; padding: 2px 6px; border-radius: 3px; margin: 2px 2px 0 0; }
  .card-btn { display: block; background: #e8003d; color: #fff; text-decoration: none; text-align: center; padding: 9px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
  .card-btn:hover { background: #ff1a57; }
  .no-results { text-align: center; padding: 60px 20px; color: #555; font-size: 0.9rem; }
  .back { display: inline-block; margin-bottom: 16px; font-size: 0.82rem; color: #666; text-decoration: none; }
  .back:hover { color: #ccc; }
  .footer { text-align: center; padding: 24px 16px; font-size: 0.72rem; color: #444; border-top: 1px solid #1a1a1a; margin-top: 8px; }
  .footer a { color: #555; text-decoration: none; margin: 0 8px; }
  .footer a:hover { color: #aaa; }
</style>
</head>
<body>
<div class="header">

</div>
<div class="age-warning">&#9888;&#65039; 当サイトは18歳以上の方を対象としています。未成年の方のアクセスはお断りします。</div>
<div class="search-area">
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="&#128269; タイトル・タグで絞り込む..." autocomplete="off">
    <button class="search-clear" id="searchClear">&#10005;</button>
    <div class="search-count" id="searchCount">全10作品</div>
  </div>
</div>
<div class="container">
  <a href="/" class="back">&#8592; トップページ</a>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none">&#128269; 該当する作品が見つかりませんでした</div>
</div>
<div class="footer">
  <a href="/">トップ</a>
  <a href="/privacy.html">プライバシーポリシー</a>
  <a href="/terms.html">利用規約</a>
  <p style="margin-top:8px">&copy; 2026 素人アーカイブ &nbsp; 18歳未満の方のアクセスはお断りします</p>
</div>
<script>

  { pid:2, title:'【4K】アプリで知り合ったお姉さん♪私服でオモチャ攻め♪スポブラ着用！♪パンツの中で直接ぐにぐにで感じちゃう', tags:['素人','4K','オモチャ'], img:'https://img.pcolle.com/68225faa3b8d867e4/2780176a26d5e9cb441/234705_4.jpg' },
  { pid:3, title:'[歴代No.1評価/夏の逝劇]絶世の色白美女ふたたび。猛暑につき「ほぼ裸」で降臨。生、生、生の嵐。', tags:['素人','美女','ハメ撮り','中出し'], img:'https://img.pcolle.com/35458f82f1a3a2a0/24439666ee9f7be04e9/192707_1.jpg' },
  { pid:4, title:'171cm美容部員ローターオナ生フェラ騎乗位グラインド＋生挿入たっぷり中出し', tags:['素人','美容部員','中出し','生フェラ'], img:'https://img.pcolle.com/1546965d67ab8db073/272035697bfbfa7155d/093154_IMG_5580.jpeg' },
  { pid:5, title:'【触診3】保育士さんのHカップ巨乳を本格揉みしだき！乳首責めで「ダメ…」と喘ぐ敏感ボディを治療名目でイカせ寸前', tags:['素人','巨乳','おっぱい','触診'], img:'https://img.pcolle.com/1903569eb62e4be23b/27651269f61fb36c6dd/010051_ruru1g.gif' },

  { pid:7, title:'【同行中OL】上司が運転中、私は隣でバレないようにスリル満点動画撮影♡', tags:['素人','OL','露出','スリル'], img:'https://img.pcolle.com/1895469cc423d60bfe/2780386a27ea3e2f8a3/192606_1.gif' },

  { pid:10, title:'【性体6】巨乳ちゃんと美乳ちゃん２！2人でおっぱいもみまくり！おまたもぷにぷにマッサージ！', tags:['素人','巨乳','おっぱい','2名'], img:'https://img.pcolle.com/1896069ce1f7cd62d3/2774386a12fbb03daf7/222256_1.gif' }
];

function renderCards(list) {
  var grid = document.getElementById('grid');
  var noRes = document.getElementById('noResults');
  var count = document.getElementById('searchCount');
  grid.innerHTML = '';
  if (list.length === 0) {
    noRes.style.display = '';
    count.textContent = '0件';
    return;
  }
  noRes.style.display = 'none';
  count.textContent = list.length + '件 / 全10作品';
  list.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      '<img class="card-img" src="' + p.img + '" alt="' + p.title + '" loading="lazy" onerror="this.style.background='#1e0010';this.style.height='120px'">' +
      '<div class="card-body">' +
        '<div class="card-num">No.' + p.pid + '</div>' +
        '<div class="card-title">' + p.title + '</div>' +
        '<div class="tags">' + p.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
        '<a href="/?pid=' + p.pid + '" class="card-btn">&#9654; 視聴する</a>' +
      '</div>';
    grid.appendChild(div);
  });
}

renderCards(products);

var input = document.getElementById('searchInput');
var clearBtn = document.getElementById('searchClear');

input.addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  clearBtn.style.display = q ? 'block' : 'none';
  if (!q) { renderCards(products); return; }
  var filtered = products.filter(function(p) {
    return p.title.toLowerCase().includes(q) || p.tags.some(function(t){ return t.includes(q); });
  });
  renderCards(filtered);
});

clearBtn.addEventListener('click', function() {
  input.value = '';
  clearBtn.style.display = 'none';
  renderCards(products);
  input.focus();
});
</script>
</body>
</html>
