<script>

// 広告未ロード時にエリアを折りたたむ
setTimeout(function() {
  var az = document.getElementById('ad-zone');
  if (!az) return;
  var ins = az.querySelector('ins');
  if (!ins || ins.offsetHeight === 0) {
    az.style.cssText = 'margin:0!important;padding:0!important;min-height:0!important;height:0!important;overflow:hidden!important;display:block!important;';
  }
}, 1500);

var P = JSON.parse(document.getElementById('pdata').textContent);
var pid = new URLSearchParams(window.location.search).get('pid') || '1';
var main = P[pid] || P['1'];

// タグ・タイトル・説明・ボタン
document.getElementById('main-tags').innerHTML = main.tags.map(function(t){ return '<span class="tag">'+t+'</span>'; }).join('');
document.getElementById('main-title').textContent = main.title;
document.getElementById('main-desc').textContent = main.desc;
document.getElementById('main-btn').href = main.url;

// スライドショー（メイン）
function buildSlideshow(containerId, dotsId, imgs) {
  var container = document.getElementById(containerId);
  var dotsEl = document.getElementById(dotsId);
  var current = 0;
  imgs.forEach(function(src, i) {
    var img = document.createElement('img');
    img.className = 'slideshow-img' + (i === 0 ? ' active' : '');
    img.src = src;
    img.alt = '';
    img.loading = i === 0 ? 'eager' : 'lazy';
    container.insertBefore(img, dotsEl);
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });
  if (imgs.length <= 1) return;
  var imgEls = container.querySelectorAll('.slideshow-img');
  var dotEls = dotsEl.querySelectorAll('.dot');
  setInterval(function() {
    imgEls[current].classList.remove('active');
    dotEls[current].classList.remove('active');
    current = (current + 1) % imgs.length;
    imgEls[current].classList.add('active');
    dotEls[current].classList.add('active');
  }, 3000);
}
buildSlideshow('main-slideshow', 'main-dots', main.imgs);

// その他の作品（サムネ1枚）
var otherEl = document.getElementById('other-products');
Object.keys(P).forEach(function(key) {
  if (key === pid) return;
  var p = P[key];
  var div = document.createElement('div');
  div.className = 'product-box';
  div.innerHTML =
    '<img class="product-box-img" src="'+p.imgs[0]+'" alt="'+p.title+'" loading="lazy">' +
    '<div class="product-box-body">' +
      '<div class="tags">'+p.tags.map(function(t){ return '<span class="tag-sub">'+t+'</span>'; }).join('')+'</div>' +
      '<h2>'+p.title+'</h2>' +
      '<p>'+p.desc+'</p>' +
      '<a href="/?pid='+key+'" class="btn-sub">&#9654; この動画を見る</a>' +
    '</div>';
  otherEl.appendChild(div);
});
</script>
